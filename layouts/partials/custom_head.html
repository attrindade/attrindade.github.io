<style>
:root {

    --cover-text-color: #2f9f41;
    --highlight: rgb(39 156 58 / 82%);
    --highlight-contrast: #ffffffa6;
    --highlight-inverse: #28bf41;
    --highlight-inverse-contrast: #d6edff;
 
    --cover-title-text-shadow: #000000 2px 2px 20px;
    --sticky-menu-text-color: #018133;
    --section-light-bg-color: #e1e1e1;
    --secion-dark-text-color: #e1e1e1;
    --section-dark-bg-color: #018133;
    --footer-color-background: #000000dc;
}

/* CSS para as duas imagens em linha */

.two-images-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 20px auto;
}

.image-wrapper {
  position: relative;
  overflow: hidden;
  margin: 0 10px;
}

.image-link {
  display: block;
  overflow: hidden;
}

.image-link img {
  display: block;
  width: 100%;
  height: auto;
  transition: transform 0.3s ease-in-out;
}

.image-link:hover img {
  transform: scale(0.95);
}

.image-caption {
  text-align: center;
  margin-top: 5px;
  font-size: 0.9em;
  color: #666;
}

@media (max-width: 768px) {
  .two-images-container {
    flex-direction: column;
  }
  
  .image-wrapper {
    width: 100% !important;
    margin: 10px 0;
  }
}

/* CSS para a transição smooth dos details*/

details {
  transition: all 0.3s ease;
}

details[open] summary ~ * {
  animation: smoothExpand 0.3s ease-in-out;
}

@keyframes smoothExpand {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* remoção da seta nos details */

details > summary {
  list-style: none;
  cursor: pointer;

details[open] summary {
   background: #F9D478;
}

}
details > summary::-webkit-details-marker {
  display: none;
}

/* CSS para fazer os summaries dos details ficarem bonitos */

details {
  border: 1px solid #aaa;
  border-radius: 4px;
  padding: 0.5em 0.5em 0;
  margin-bottom: 1em;
}

summary {
  font-weight: bold;
  margin: -0.5em -0.5em 0;
  padding: 0.5em;
  cursor: pointer;
}

details[open] {
  padding: 0.8em;
}

details[open] summary {
  border-bottom: 1px solid #aaa;
  margin-bottom: 0.5em;
}

/* correção do height e padding para o site-head ser mostrado por inteiro em telas menores */

@media only screen and (max-width: 500px) {
    #site-head {
        padding: 10% 0;
        height: 100%;
    }
}

</style>
